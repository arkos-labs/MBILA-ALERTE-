<!DOCTYPE html>
<html lang="fr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#ffffff">
    <title>MBila - Info Trafic</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
                        surface: '#f8fafc'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f1f5f9;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4), 0 8px 10px -6px rgba(37, 99, 235, 0.1);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
        }

        .fab:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.5), 0 8px 10px -6px rgba(37, 99, 235, 0.1);
        }

        .fab:active {
            transform: translateY(1px) scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-out;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }
        .input-field:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass-header fixed top-0 left-0 right-0 z-30">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="MBila" class="h-16 object-contain scale-[1.35] origin-left drop-shadow-sm">
            </div>
            

        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-20 pb-32 px-4 max-w-md mx-auto min-h-screen">
        
        <!-- Filter -->
        <div class="mb-6 relative">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            </div>
            <select id="lineFilter" class="w-full pl-12 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl shadow-sm font-medium text-gray-700 appearance-none focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                <option value="all">Toutes les lignes</option>
            </select>
            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>
        
        <!-- Feed -->
        <div id="incidentsFeed" class="flex flex-col gap-4">
            <div class="flex flex-col items-center justify-center py-20 text-gray-400">
                <div class="loader mb-4"></div>
                <p class="font-medium">Actualisation du réseau...</p>
            </div>
        </div>
    </main>

    <!-- FAB -->
    <div class="fab" id="reportBtn" title="Signaler une perturbation">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal-overlay" onclick="closeReportModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">Signaler une perturbation</h2>
                <button onclick="closeReportModal()" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <form id="reportForm" onsubmit="submitReport(event)">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ligne</label>
                        <select id="incidentLine" required class="input-field">
                            <option value="">Sélectionner...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Station</label>
                        <select id="incidentStation" required class="input-field disabled:bg-gray-100 disabled:text-gray-400" disabled>
                            <option value="">En attente...</option>
                        </select>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Direction</label>
                    <select id="incidentDirection" required class="input-field disabled:bg-gray-100 disabled:text-gray-400" disabled>
                        <option value="">En attente de la ligne...</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nature de la perturbation</label>
                    <div id="incidentTypes" class="grid grid-cols-4 gap-2">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Impact estimé (Gravité)</label>
                    <select id="incidentSeverity" class="input-field">
                        <option value="low">Mineur (Peu d'impact)</option>
                        <option value="medium">Modéré (Quelques ralentissements)</option>
                        <option value="high" selected>Grave (Trafic très perturbé)</option>
                        <option value="critical">Critique (Trafic interrompu)</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Précisions (Optionnel)</label>
                    <textarea id="incidentDesc" maxlength="200" placeholder="Informez les autres voyageurs..." class="input-field resize-none h-24"></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Photo (Optionnel)</label>
                    <div class="relative">
                        <input type="file" id="incidentPhoto" accept="image/*" capture="environment" onchange="handlePhotoSelect(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-center bg-gray-50 flex flex-col items-center justify-center gap-2 text-gray-500 hover:bg-gray-100 hover:border-gray-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            <span class="text-sm font-medium">Ajouter une photo</span>
                        </div>
                    </div>
                    <div id="photoPreview" class="mt-3"></div>
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        Envoyer le signalement
                    </button>
                </div>

                <div id="reportStatus" class="mt-4"></div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/db.js"></script>
    <script src="/stationsData.js"></script>
    <script src="/incidents.js"></script>
    <script src="/app.js"></script>
</body>
</html>
